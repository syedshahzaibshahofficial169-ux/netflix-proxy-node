<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netflix Cloud - Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background-color: #0f0f0f; color: #eee; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1a1a1a; padding: 40px; border-radius: 12px; text-align: center; max-width: 350px; width: 90%; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border-top: 4px solid #E50914; }
    h2 { margin-top: 0; margin-bottom: 20px; }
    input[type="password"] { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #333; background: #000; color: white; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #E50914; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #f40612; }
    .error { color: #ff4d4d; margin-bottom: 15px; font-size: 0.9em; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Admin Login</h2>
    <div class="error" id="errorMsg">Incorrect admin password.</div>
    <form action="/admin-login" method="POST">
      <input type="password" name="admin_password" placeholder="Admin Password" required autofocus>
      <button type="submit">Login to Admin</button>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error=1')) {
      document.getElementById('errorMsg').style.display = 'block';
    }
  </script>
</body>
</html>
